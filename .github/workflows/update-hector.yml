name: Update Hector Calendar

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Fetch and filter Hector ICS
        run: node scripts/fetch-hector-ics.mjs

      - name: Commit updated ICS if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/calendars/Hector.ics
          if git diff --cached --quiet; then
            echo "No changes to Hector.ics — skipping commit."
          else
            git commit -m "chore: auto-update Hector.ics from Artist Growth [skip ci]"
            git push
          fi
